<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ورود به پنل مدیریت</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-box {
            max-width: 380px;
            margin: 100px auto;
            padding: 30px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="margin-bottom: 20px; text-align: center;">ورود ادمین</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color: red; font-size: 0.85rem; margin-bottom: 15px;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="form-group">
                <label>نام کاربری</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>رمز عبور</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-submit" style="width: 100%;">ورود</button>
        </form>
    </div>
</body>
</html>
